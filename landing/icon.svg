<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background with rounded corners (safe area: ~80% for maskable icons) -->
  <rect width="512" height="512" rx="100" ry="100" fill="#08080c"/>

  <!-- Strobe bar accent strip across the bottom -->
  <g fill="#06b6d4" opacity="0.55">
    <rect x="80"  y="392" width="22" height="28" rx="3"/>
    <rect x="118" y="392" width="22" height="28" rx="3"/>
    <rect x="156" y="392" width="22" height="28" rx="3"/>
    <rect x="194" y="392" width="22" height="28" rx="3"/>
    <rect x="232" y="392" width="22" height="28" rx="3"/>
    <rect x="270" y="392" width="22" height="28" rx="3"/>
    <rect x="308" y="392" width="22" height="28" rx="3"/>
    <rect x="346" y="392" width="22" height="28" rx="3"/>
    <rect x="384" y="392" width="22" height="28" rx="3"/>
    <rect x="422" y="392" width="22" height="28" rx="3"/>
  </g>

  <!-- V mark — bold monospace -->
  <text
    x="256"
    y="330"
    text-anchor="middle"
    font-family="ui-monospace, 'JetBrains Mono', SFMono-Regular, Menlo, monospace"
    font-weight="900"
    font-size="320"
    fill="#06b6d4"
  >V</text>
</svg>
