name: Build desktop (Windows / macOS / Linux)

# Triggers:
# - push to main → builds all three, uploads artifacts (no release)
# - pushing a tag like v0.2.0 → builds all three AND drafts a GitHub Release
#   with the installers attached.
#
# To cut a new desktop release:
#   git tag v0.2.0
#   git push --tags
on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest      # Apple Silicon — produces .dmg + .app
            args: --target aarch64-apple-darwin
          - platform: macos-13          # Intel mac — produces x86_64 .dmg
            args: --target x86_64-apple-darwin
          - platform: ubuntu-22.04      # Linux — .deb + .AppImage
            args: ''
          - platform: windows-latest    # Windows — .msi + .exe
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          # macOS Apple Silicon needs aarch64; Intel mac needs x86_64
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin' || (matrix.platform == 'macos-13' && 'x86_64-apple-darwin' || '') }}

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux WebKit deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Install npm deps
        run: npm ci

      - name: Build (and release on tag)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Auto-creates a GitHub Release on tag push (v__VERSION__).
          # On normal main pushes, artifacts are uploaded to the run instead.
          tagName: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || '' }}
          releaseName: ${{ startsWith(github.ref, 'refs/tags/v') && format('V-Tune {0}', github.ref_name) || '' }}
          releaseBody: 'See `CHANGELOG.md` for what changed in this release.'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
