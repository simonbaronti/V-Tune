# V-Tune release pipeline — Windows + Linux + Android, single workflow,
# single GitHub Release per tag.
#
# Triggered when you push a git tag matching v*.*.* — e.g.:
#   git tag v1.0.1
#   git push origin v1.0.1
#
# Three job groups run in parallel, then a `publish` job collects all
# artifacts (+ the user guide PDF) and creates ONE GitHub Release.
#
# macOS .dmg is deliberately NOT in CI:
#   - GitHub free tier macOS runners are scarce, builds queue for
#     hours-to-days, and macOS minutes burn 10x the budget of Linux.
#   - You have a Mac. `npm run tauri:build` locally produces the .dmg
#     in a couple of minutes, and you can drag-and-drop it into the
#     GitHub Release page after the fact.
#
# Required GitHub Secrets:
#   ANDROID_KEYSTORE_BASE64    — base64-encoded contents of
#                                android/keystore/v-tune-release.jks
#   ANDROID_KEYSTORE_PASSWORD  — the keystore password
#
# Required repo setting:
#   Settings → Actions → General → Workflow permissions
#   → "Read and write permissions"
#   (so the workflow can create the Release + upload assets)

name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:   # manual re-run from the Actions UI

jobs:
  # ───────────────────────────────────────────────────────────────────
  # Desktop — Windows (.msi + .exe) + Linux (.deb + .AppImage)
  # ───────────────────────────────────────────────────────────────────
  desktop:
    name: Desktop (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
          - platform: ubuntu-22.04

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux WebKit deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Install npm deps
        run: npm ci

      - name: Build Tauri
        run: npm run tauri:build

      - name: Stage Windows artifacts
        if: matrix.platform == 'windows-latest'
        shell: bash
        run: |
          mkdir -p staging
          cp src-tauri/target/release/bundle/msi/*.msi staging/ 2>/dev/null || true
          cp src-tauri/target/release/bundle/nsis/*-setup.exe staging/ 2>/dev/null || true
          ls -la staging/

      - name: Stage Linux artifacts
        if: matrix.platform == 'ubuntu-22.04'
        shell: bash
        run: |
          mkdir -p staging
          cp src-tauri/target/release/bundle/deb/*.deb staging/ 2>/dev/null || true
          cp src-tauri/target/release/bundle/appimage/*.AppImage staging/ 2>/dev/null || true
          ls -la staging/

      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.platform }}
          path: staging/*
          if-no-files-found: error

  # ───────────────────────────────────────────────────────────────────
  # Android — signed release APK
  # ───────────────────────────────────────────────────────────────────
  android:
    name: Android (APK)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # Capacitor 8 compiles its Android library against source release
      # 21, so the build JDK must be 21 (not 17).
      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install npm deps
        run: npm ci

      - name: Build web bundle
        run: npm run build

      - name: Capacitor sync into android/
        run: npx cap sync android

      # Decode keystore from the GitHub Secret to the path build.gradle
      # expects (android/keystore/v-tune-release.jks).
      # Pass the secret via env + printf (not echo) so the shell can't
      # mangle it, then decode. `base64 -d` tolerates whitespace, but the
      # secret should be a single unwrapped line regardless. Validate the
      # decoded keystore immediately so a corrupted secret fails here with
      # a clear message rather than deep inside gradle's signing step.
      - name: Restore + validate keystore
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        run: |
          mkdir -p android/keystore
          printf '%s' "$KEYSTORE_B64" | base64 -d > android/keystore/v-tune-release.jks
          if keytool -list -keystore android/keystore/v-tune-release.jks -storepass "$KEYSTORE_PASSWORD" >/dev/null 2>&1; then
            echo "✓ keystore decoded + opened OK"
          else
            echo "✗ keystore invalid after decode — re-create the ANDROID_KEYSTORE_BASE64 secret from a single-line base64"
            exit 1
          fi

      - name: Build signed release APK
        working-directory: android
        env:
          VTUNE_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        run: ./gradlew assembleRelease --no-daemon

      - name: Verify signature
        working-directory: android/app/build/outputs/apk/release
        run: |
          APKSIGNER=$(find $ANDROID_HOME/build-tools -name apksigner | sort -V | tail -1)
          "$APKSIGNER" verify --verbose app-release.apk

      # Stage from the repo root with a full relative path — avoids the
      # off-by-one `../../../` counting that put the APK in the wrong
      # place last run.
      - name: Stage APK with version in filename
        run: |
          mkdir -p staging
          cp android/app/build/outputs/apk/release/app-release.apk "staging/V-Tune-${{ github.ref_name }}.apk"
          ls -la staging/

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: staging/*.apk
          if-no-files-found: error

  # ───────────────────────────────────────────────────────────────────
  # Publish — collect every artifact, attach the PDF, create Release
  # ───────────────────────────────────────────────────────────────────
  publish:
    name: Publish GitHub Release
    needs: [desktop, android]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout (for the user guide PDF)
        uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten + add PDF
        run: |
          mkdir -p release-assets
          find artifacts -type f \( -name '*.msi' -o -name '*-setup.exe' \
            -o -name '*.deb' -o -name '*.AppImage' -o -name '*.apk' \) \
            -exec cp {} release-assets/ \;
          cp docs/V-Tune-User-Guide.pdf release-assets/
          echo "── Final release assets ──"
          ls -la release-assets/

      # Build the release body: the matching version's section from
      # CHANGELOG.md (the "what's new") followed by the downloads table.
      # The tag is vX.Y.Z; the changelog headings are "## [X.Y.Z]", so we
      # strip the leading "v" and awk out everything between this version's
      # heading and the next "## [" heading.
      - name: Build release notes
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          {
            echo "## What's new in ${GITHUB_REF_NAME}"
            echo ""
            awk -v v="$VERSION" '
              $0 ~ "^## \\[" v "\\]" { grab=1; next }
              grab && /^## \[/ { exit }
              grab { print }
            ' CHANGELOG.md | sed '/^\[/d'
            cat <<'EOF'

          ### Downloads

          | Platform | File |
          |---|---|
          | macOS | `V-Tune_*_universal.dmg` — universal (Intel + Apple Silicon), notarized |
          | Windows | `V-Tune_*_x64-setup.exe` (recommended) or `V-Tune_*_x64_en-US.msi` |
          | Linux | `V-Tune_*_amd64.deb` (Debian/Ubuntu) or `V-Tune_*_amd64.AppImage` (universal) |
          | Android | `V-Tune-*.apk` (sideload — enable "Install unknown apps" for your browser) |
          | iOS | TestFlight beta: https://testflight.apple.com/join/b6pCcWQ7 |

          The full [User Guide](V-Tune-User-Guide.pdf) is attached to this release.

          - Web app: https://v-tune-handpan.vercel.app
          - Full changelog: https://github.com/simonbaronti/V-Tune/blob/main/CHANGELOG.md
          EOF
          } > release-notes.md
          echo "── Generated release notes ──"
          cat release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: V-Tune ${{ github.ref_name }}
          body_path: release-notes.md
          files: release-assets/*
          draft: false
          prerelease: false
