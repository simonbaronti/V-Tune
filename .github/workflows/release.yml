# V-Tune release pipeline — fully automated, all platforms in CI.
#
# Triggered on a git tag matching v*.*.* (e.g. `git tag v1.0.8 && git push
# origin v1.0.8`). Flow:
#
#   create-release → builds a draft GitHub Release with the changelog notes
#   desktop (matrix) → macOS (universal, signed + notarized), Windows, Linux
#                      via tauri-action: builds, signs the updater artifacts,
#                      uploads installers + .sig, and merges latest.json
#   android          → signed APK, uploaded to the draft release
#   ios              → fastlane: builds the Capacitor app, uploads to
#                      TestFlight, submits for beta review + external group.
#                      Does NOT gate `publish` — an Apple-side hiccup must not
#                      block the desktop/Android release. Re-run just this job
#                      from the Actions UI if it fails.
#   publish          → attaches the user-guide PDF, then publishes (un-drafts)
#
# The desktop apps poll
#   https://github.com/simonbaronti/V-Tune/releases/latest/download/latest.json
# (set in tauri.conf.json) and update themselves from it.
#
# Required GitHub Secrets
#   # Android signing
#   ANDROID_KEYSTORE_BASE64            base64 of the release keystore
#   ANDROID_KEYSTORE_PASSWORD          its password
#   # Tauri update signing (all desktop platforms)
#   TAURI_SIGNING_PRIVATE_KEY          contents of src-tauri/.tauri-signing.key
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD its password
#   # macOS code signing + notarization
#   APPLE_CERTIFICATE                  base64 of the Developer ID .p12
#   APPLE_CERTIFICATE_PASSWORD         the .p12 export password
#   APPLE_SIGNING_IDENTITY             "Developer ID Application: … (TEAMID)"
#   APPLE_ID                           Apple ID email
#   APPLE_PASSWORD                     app-specific password
#   APPLE_TEAM_ID                      10-char team id
#   KEYCHAIN_PASSWORD                  any string (temp keychain in CI)
#   # iOS → TestFlight (see RELEASING.md for how to create these)
#   APP_STORE_CONNECT_API_KEY_ID       App Store Connect API key id
#   APP_STORE_CONNECT_API_ISSUER_ID    issuer id (App Store Connect → Integrations)
#   APP_STORE_CONNECT_API_KEY_CONTENT  base64 of the API key .p8 file
#   IOS_DIST_CERT_P12_BASE64           base64 of the Apple Distribution .p12
#                                      (NOT the Developer ID one — that's macOS)
#   IOS_DIST_CERT_PASSWORD             its export password
#
# Required repo setting: Settings → Actions → General → Workflow permissions
#   → "Read and write permissions".

name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  # ───────────────────────────────────────────────────────────────────
  # Create a DRAFT release first so every build job uploads into the same
  # release without racing to create it. Body = this version's changelog.
  # ───────────────────────────────────────────────────────────────────
  create-release:
    name: Create draft release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      release_id: ${{ steps.create.outputs.release_id }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Fail the whole release fast if any of the version sources (package
      # json/lock, tauri, Cargo, iOS pbxproj, Android gradle, landing page,
      # CHANGELOG section) disagrees with the tag. `npm run bump x.y.z`
      # updates all of them together.
      - name: Verify all version sources match the tag
        if: github.ref_type == 'tag'
        run: node scripts/check-versions.mjs "${GITHUB_REF_NAME#v}"

      - name: Build release notes from CHANGELOG
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          {
            echo "## What's new in ${GITHUB_REF_NAME}"
            echo ""
            awk -v v="$VERSION" '
              $0 ~ "^## \\[" v "\\]" { grab=1; next }
              grab && /^## \[/ { exit }
              grab { print }
            ' CHANGELOG.md | sed '/^\[/d'
            cat <<'EOF'

          ### Downloads

          | Platform | File |
          |---|---|
          | macOS | `V-Tune_*_universal.dmg` — universal (Intel + Apple Silicon), notarized |
          | Windows | `V-Tune_*_x64-setup.exe` (recommended) or `V-Tune_*_x64_en-US.msi` |
          | Linux | `V-Tune_*_amd64.deb` or `V-Tune_*_amd64.AppImage` |
          | Android | `V-Tune-*.apk` (sideload — enable "Install unknown apps") |
          | iOS | TestFlight beta: https://testflight.apple.com/join/b6pCcWQ7 |

          Desktop apps (macOS / Windows / Linux) update themselves in-app from here on.
          The full [User Guide](V-Tune-User-Guide.pdf) is attached.

          - Web app: https://v-tune-handpan.vercel.app
          - Full changelog: https://github.com/simonbaronti/V-Tune/blob/main/CHANGELOG.md
          EOF
          } > release-notes.md

      - name: Create draft release
        id: create
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Look up an existing release for this tag (drafts included — they
          # aren't tag-associated until published, so we can't query by tag;
          # we filter the full list by tag_name). Create one via the API if
          # absent. The API returns the numeric id directly, which the matrix
          # build jobs need (gh release create on a draft can't give us that).
          id=$(gh api "repos/${{ github.repository }}/releases" --paginate \
            --jq ".[] | select(.tag_name==\"$GITHUB_REF_NAME\") | .id" | head -1)
          if [ -z "$id" ]; then
            id=$(gh api "repos/${{ github.repository }}/releases" \
              -f tag_name="$GITHUB_REF_NAME" \
              -F draft=true \
              -f name="V-Tune $GITHUB_REF_NAME" \
              -f body="$(cat release-notes.md)" \
              --jq .id)
          fi
          echo "release_id=$id" >> "$GITHUB_OUTPUT"
          echo "Draft release id: $id"

  # ───────────────────────────────────────────────────────────────────
  # Desktop — macOS (universal, signed + notarized) + Windows + Linux.
  # tauri-action builds, signs the updater artifacts, uploads them to the
  # draft release, and maintains latest.json across the matrix.
  # ───────────────────────────────────────────────────────────────────
  desktop:
    name: Desktop (${{ matrix.platform }})
    needs: create-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target universal-apple-darwin'
            rust-targets: 'aarch64-apple-darwin,x86_64-apple-darwin'
          - platform: ubuntu-22.04
            args: ''
            rust-targets: ''
          - platform: windows-latest
            args: ''
            rust-targets: ''
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux WebKit deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Install npm deps
        run: npm ci

      - name: Build + sign + upload (tauri-action)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Updater signing — all platforms.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # macOS code signing + notarization (ignored on Win/Linux).
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: ${{ matrix.args }}

  # ───────────────────────────────────────────────────────────────────
  # Android — signed APK, uploaded straight to the draft release.
  # ───────────────────────────────────────────────────────────────────
  android:
    name: Android (APK)
    needs: create-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # Capacitor 8 compiles its Android library against source release 21.
      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install npm deps
        run: npm ci

      - name: Build web bundle
        run: npm run build

      - name: Capacitor sync into android/
        run: npx cap sync android

      - name: Restore + validate keystore
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        run: |
          mkdir -p android/keystore
          printf '%s' "$KEYSTORE_B64" | base64 -d > android/keystore/v-tune-release.jks
          if keytool -list -keystore android/keystore/v-tune-release.jks -storepass "$KEYSTORE_PASSWORD" >/dev/null 2>&1; then
            echo "✓ keystore decoded + opened OK"
          else
            echo "✗ keystore invalid after decode — re-create ANDROID_KEYSTORE_BASE64"
            exit 1
          fi

      - name: Build signed release APK
        working-directory: android
        env:
          VTUNE_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        run: ./gradlew assembleRelease --no-daemon

      - name: Verify signature
        working-directory: android/app/build/outputs/apk/release
        run: |
          APKSIGNER=$(find $ANDROID_HOME/build-tools -name apksigner | sort -V | tail -1)
          "$APKSIGNER" verify --verbose app-release.apk

      - name: Upload APK to draft release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cp android/app/build/outputs/apk/release/app-release.apk "V-Tune-${GITHUB_REF_NAME}.apk"
          gh release upload "$GITHUB_REF_NAME" "V-Tune-${GITHUB_REF_NAME}.apk" --clobber

  # ───────────────────────────────────────────────────────────────────
  # iOS — build the Capacitor app, upload to TestFlight, auto-submit for
  # beta review and distribute to the external tester group (fastlane).
  # Runs off the same tag as everything else so iOS can't fall behind.
  # Deliberately NOT in publish's `needs`: the GitHub release ships even if
  # Apple is having a bad day; re-run this job alone from the Actions UI.
  # ───────────────────────────────────────────────────────────────────
  ios:
    name: iOS (TestFlight)
    needs: create-release   # after the version-sources-vs-tag check
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Ruby + fastlane
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler: '2'   # Gemfile.lock's old 1.17.2 pin dies on Ruby 3.3 (untaint removed)
          bundler-cache: true

      - name: Install npm deps
        run: npm ci

      - name: Build web bundle
        run: npm run build

      - name: Capacitor sync into ios/
        run: npx cap sync ios

      - name: Decode Apple Distribution certificate
        env:
          CERT_B64: ${{ secrets.IOS_DIST_CERT_P12_BASE64 }}
        run: |
          printf '%s' "$CERT_B64" | base64 -d > "$RUNNER_TEMP/ios-dist.p12"

      - name: Build + upload to TestFlight (fastlane)
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}
          IOS_DIST_CERT_PASSWORD: ${{ secrets.IOS_DIST_CERT_PASSWORD }}
          # The external TestFlight group builds are pushed to. Override with
          # a repo variable if the group is named differently in App Store
          # Connect (TestFlight tab → sidebar, exact spelling matters).
          TESTFLIGHT_EXTERNAL_GROUP: ${{ vars.TESTFLIGHT_EXTERNAL_GROUP || 'External Testers' }}
        run: |
          export IOS_DIST_CERT_P12_PATH="$RUNNER_TEMP/ios-dist.p12"
          bundle exec fastlane ios beta

  # ───────────────────────────────────────────────────────────────────
  # Publish — attach the user guide, then un-draft the release.
  # ───────────────────────────────────────────────────────────────────
  publish:
    name: Publish release
    needs: [create-release, desktop, android]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # tauri-action leaves latest.json's "notes" empty. Inject this version's
      # CHANGELOG section (markdown stripped to plain text) so the in-app
      # updater shows what's new. Runs after all desktop jobs, so latest.json
      # already has every platform.
      - name: Inject changelog notes into latest.json
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          NOTES=$(awk -v v="$VERSION" '
            $0 ~ "^## \\[" v "\\]" { grab=1; next }
            grab && /^## \[/ { exit }
            grab { print }
          ' CHANGELOG.md | sed -e 's/^### /\n/' -e 's/^- /• /' -e 's/\*\*//g' | sed '/^\[/d')
          gh release download "$GITHUB_REF_NAME" --pattern latest.json --dir /tmp --clobber
          jq --arg notes "$NOTES" '.notes = ($notes | ltrimstr("\n"))' /tmp/latest.json > /tmp/latest.new.json
          mv /tmp/latest.new.json /tmp/latest.json
          gh release upload "$GITHUB_REF_NAME" /tmp/latest.json --clobber
          echo "── latest.json notes ──"; jq -r .notes /tmp/latest.json

      - name: Attach user guide + publish
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "$GITHUB_REF_NAME" docs/V-Tune-User-Guide.pdf --clobber
          gh release edit "$GITHUB_REF_NAME" --draft=false
          echo "── published assets ──"
          gh release view "$GITHUB_REF_NAME" --json assets --jq '.assets[].name'
