# Release pipeline — builds the Android APK and the Windows Tauri
# installer in parallel, then publishes them (plus the user guide) as
# a GitHub Release.
#
# Triggered when you push a git tag matching v*.*.* — e.g.:
#   git tag v1.0.1
#   git push origin v1.0.1
#
# Required GitHub Secrets (set at Settings → Secrets and variables →
# Actions):
#   ANDROID_KEYSTORE_BASE64    — base64-encoded contents of
#                                android/keystore/v-tune-release.jks
#   ANDROID_KEYSTORE_PASSWORD  — the keystore password
#
# (The key alias is hardcoded in build.gradle as "v-tune-release"; the
# key password equals the keystore password since we use the same for
# both. If you ever generate a new keystore with a different alias or
# split passwords, you'll also need ANDROID_KEY_ALIAS and
# ANDROID_KEY_PASSWORD secrets.)

name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  # ───────────────────────────────────────────────────────────────────
  # Android — produces a signed APK for direct download / sideload
  # ───────────────────────────────────────────────────────────────────
  android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install npm dependencies
        run: npm ci

      - name: Build web bundle
        run: npm run build

      - name: Capacitor sync (copies web bundle into android/)
        run: npx cap sync android

      # Decode the keystore from the GitHub Secret to the exact path
      # build.gradle expects. The secret is the raw .jks file
      # base64-encoded; produce it locally with:
      #   base64 -i android/keystore/v-tune-release.jks | pbcopy
      - name: Restore keystore
        run: |
          mkdir -p android/keystore
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/keystore/v-tune-release.jks
          ls -la android/keystore/v-tune-release.jks

      - name: Build release APK
        working-directory: android
        env:
          VTUNE_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        run: ./gradlew assembleRelease --no-daemon

      - name: Verify signature
        working-directory: android/app/build/outputs/apk/release
        run: |
          ls -la
          # Use apksigner from build-tools to verify the signature
          APKSIGNER=$(find $ANDROID_HOME/build-tools -name apksigner | sort -V | tail -1)
          "$APKSIGNER" verify --verbose app-release.apk

      - name: Rename APK with version
        working-directory: android/app/build/outputs/apk/release
        run: mv app-release.apk V-Tune-${{ github.ref_name }}.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: android/app/build/outputs/apk/release/V-Tune-*.apk
          if-no-files-found: error

  # ───────────────────────────────────────────────────────────────────
  # Windows — Tauri desktop installer (.msi + .exe via NSIS)
  # ───────────────────────────────────────────────────────────────────
  windows:
    name: Build Windows installer
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri (web + Rust + installer)
        run: npm run tauri:build

      - name: List build artifacts
        shell: bash
        run: |
          echo "── MSI installers ──"
          find src-tauri/target -name '*.msi' || true
          echo "── NSIS installers ──"
          find src-tauri/target -name '*-setup.exe' || true

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-installers
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*-setup.exe
          if-no-files-found: error

  # ───────────────────────────────────────────────────────────────────
  # Publish — collect all artifacts, attach to a GitHub Release
  # ───────────────────────────────────────────────────────────────────
  release:
    name: Publish GitHub Release
    needs: [android, windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout (for the user guide PDF)
        uses: actions/checkout@v4

      - name: Download Android artifact
        uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: artifacts/

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-installers
          path: artifacts/

      - name: Stage user guide
        run: cp docs/V-Tune-User-Guide.pdf artifacts/

      - name: List final release assets
        run: ls -la artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: V-Tune ${{ github.ref_name }}
          body: |
            ## V-Tune ${{ github.ref_name }}

            Precision strobe tuner for handpans and other multi-modal instruments.

            ### Downloads

            - **Android (.apk)** — sideload directly. Settings → Security → "Install unknown apps" for your browser must be enabled.
            - **Windows (.msi or .exe)** — installer that places V-Tune in Program Files and registers a Start menu shortcut. Either works; .msi is preferred if you use Group Policy / MDM.
            - **iOS** — available via the App Store: https://apps.apple.com/app/v-tune
            - **User Guide (.pdf)** — comprehensive manual covering every feature.

            ### Verifying the Android APK

            Signature: SHA256 RSA. Verify with `apksigner verify --print-certs V-Tune-${{ github.ref_name }}.apk`.

            ### See also

            - Web app: https://v-tune-handpan.vercel.app
            - Source: https://github.com/${{ github.repository }}
          files: artifacts/*
          draft: false
          prerelease: false
